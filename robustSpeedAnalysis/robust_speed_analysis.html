<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xito_Type_Gar</title>
    <link rel="stylesheet" href="robust_analysis.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Xito_Type_Gar.exe</h1>
            <div class="selector-group">
                <div class="mode-selector">
                    <label>Time:</label>
                    <button class="mode-btn active" data-time="30">30s</button>
                    <button class="mode-btn" data-time="60">60s</button>
                </div>
                <div class="difficulty-selector">
                    <label>Difficulty:</label>
                    <button class="difficulty-btn active" data-difficulty="medium">Medium</button>
                    <button class="difficulty-btn" data-difficulty="easy">Easy</button>
                    <button class="difficulty-btn" data-difficulty="hard">Hard</button>
                </div>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat">TIME: <span id="timer">0s</span></div>
            <div class="stat">WPM: <span id="wpm">0</span></div>
            <div class="stat">ACC: <span id="accuracy">100%</span></div>
        </div>

        <div id="textDisplay" class="text-display">
            Select time and press Start to begin...
        </div>

        <textarea id="userInput" placeholder="Wait for start..." disabled></textarea>

        <div class="controls">
            <button id="startBtn" onclick="startTest()">INITIALIZE TEST</button>
            <button id="pauseBtn" onclick="togglePause()" style="display:none;">PAUSE</button>
            <button id="resetBtn" onclick="resetTest()">RESET</button>
        </div>

        <div id="resultModal" class="modal">
            <div class="modal-content">
                <h2>TEST_RESULTS</h2>
                <div id="finalStats"></div>
                <button onclick="resetTest()">TRY AGAIN</button>
            </div>
        </div>

        <div class="test-history">
            <h3>RECENT TESTS</h3>
            <div id="historyList" class="history-list"></div>
            <button id="clearHistoryBtn" onclick="clearHistory()" style="display:none;">CLEAR HISTORY</button>
        </div>
    </div>

    <script src="robust analysis.js"></script>
</body>
</html>
